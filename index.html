<body>

<header>
  <div class="header-left">
    <h1>✨ StyleBot</h1>
    <p>YOUR PERSONAL AI FASHION STYLIST</p>
  </div>
  <div class="header-btns">

    <button class="hdr-btn danger" id="logout-btn" onclick="logout()" style="display:none;">🚪 Logout</button>
  </div>
</header>

<div id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="modal-title">Welcome to StyleBot ✨</div>
    <div class="modal-subtitle">Save your looks and access your style history</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="modal-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>

    <button class="modal-submit" id="auth-submit" onclick="submitAuth()">Login</button>
  </div>
</div>

<div id="history-panel">
  <div class="history-header">
    <h3>✨ My Style History</h3>
    <button class="history-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="history-list" id="history-list">
    <div class="history-empty">Loading your looks...</div>
  </div>
</div>

<div id="chat-container"></div>

<div id="personal-bar">
  <input type="text" id="city-input" placeholder="🏙️ Type your city"/>

    <option value="">🎨 Skin Tone</option>

    <option value="sensitive">Sensitive</option>

  </select>
</div>

<div id="gender-bar">

  <button class="gender-btn active" id="btn-women" onclick="setGender('women', this)">👩 Women</button>
  <button class="gender-btn" id="btn-men" onclick="setGender('men', this)">👨 Men</button>
  <button class="gender-btn" id="btn-kids" onclick="setGender('kids', this)">👦 Kids</button>

<div id="budget-bar">

</div>

<div id="occasion-bar"></div>

<div id="input-area">

      { label: "💕 Date", text: "I have a date tonight, I am a guy" },
      { label: "🎉 Festival", text: "I have a festival celebration, I am a man" },
      { label: "👔 Formal", text: "I have a formal event, I am a man" },
      { label: "🤝 Interview", text: "I have a job interview tomorrow, I am a man" }
    ],
    kids: [
      { label: "💍 Wedding", text: "I need an outfit for my child for a wedding" },
      { label: "🎒 School", text: "I need a casual outfit for my child for school" },
      { label: "🎉 Birthday", text: "I need an outfit for my child's birthday party" },
      { label: "🎓 Annual Day", text: "I need an outfit for my child's school annual day" },
      { label: "🪔 Festival", text: "I need a festival outfit for my child" }
    ]
  };

  const messages = [];
  let currentBudget = 2000;
  let currentGender = "women";

  // ── Helper to always get fresh user ID ───────────
  function getUserId() {
    if (currentUser && currentUser.id) return currentUser.id;
    try {
      const u = localStorage.getItem("sb_user");
      if (u) return JSON.parse(u).id || "anonymous";
    } catch(e) {}
    return "anonymous";
  }

  // ── Show/hide header buttons ──────────────────────
  function showLoggedIn(email) {
    document.getElementById("login-btn").style.display = "none";
    document.getElementById("history-btn").style.display = "block";
    document.getElementById("logout-btn").style.display = "block";
    document.getElementById("history-btn").textContent = "📋 " + email.split("@")[0];
  }

  function showLoggedOut() {
    document.getElementById("login-btn").style.display = "block";
    document.getElementById("history-btn").style.display = "none";
    document.getElementById("logout-btn").style.display = "none";
  }

  // ── Auth functions ────────────────────────────────
  function openAuth() {
    document.getElementById("auth-modal").classList.add("open");
  }

  function closeAuth() {
    document.getElementById("auth-modal").classList.remove("open");
    document.getElementById("modal-error").style.display = "none";
    document.getElementById("modal-success").style.display = "none";
    document.getElementById("auth-email").value = "";
    document.getElementById("auth-password").value = "";
  }

  function switchTab(tab) {
    document.getElementById("tab-login").classList.toggle("active", tab === "login");
    document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
    document.getElementById("auth-submit").textContent = tab === "login" ? "Login" : "Create Account";
    document.getElementById("modal-error").style.display = "none";
    document.getElementById("modal-success").style.display = "none";
  }

  async function submitAuth() {
    const email     = document.getElementById("auth-email").value.trim();
    const password  = document.getElementById("auth-password").value;
    const isLogin   = document.getElementById("tab-login").classList.contains("active");
    const errorEl   = document.getElementById("modal-error");
    const successEl = document.getElementById("modal-success");
    const btn       = document.getElementById("auth-submit");

    if (!email || !password) {
      errorEl.textContent = "Please enter email and password";
      errorEl.style.display = "block";
      return;
    }

    btn.textContent = isLogin ? "Logging in..." : "Creating account...";
    btn.disabled = true;
    errorEl.style.display = "none";

    try {
      const res  = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: isLogin ? "login" : "signup", email, password })
      });
      const data = await res.json();

      if (data.error || data.msg) {
        errorEl.textContent = data.error?.message || data.msg || "Something went wrong";
        errorEl.style.display = "block";
        btn.textContent = isLogin ? "Login" : "Create Account";
        btn.disabled = false;
        return;
      }

      if (!isLogin) {
        successEl.textContent = "✅ Account created! You can now login.";
        successEl.style.display = "block";
        switchTab("login");
        btn.textContent = "Login";
        btn.disabled = false;
        return;
      }

      currentUser  = data.user;
      currentToken = data.access_token;
      localStorage.setItem("sb_token", currentToken);
      localStorage.setItem("sb_user", JSON.stringify(currentUser));
      showLoggedIn(email);
      closeAuth();
      addMessage("bot", `Welcome back! 🎉 You're logged in as ${email.split("@")[0]}. Your looks are being saved automatically. Tap History to see your style history!`);

    } catch (err) {
      errorEl.textContent = "Connection error. Please try again.";
      errorEl.style.display = "block";
      btn.textContent = isLogin ? "Login" : "Create Account";
      btn.disabled = false;
    }
  }

  function logout() {
    currentUser  = null;
    currentToken = null;
    localStorage.removeItem("sb_token");
    localStorage.removeItem("sb_user");
    showLoggedOut();
    addMessage("bot", "You've been logged out. Come back anytime! ✨");
  }

  // ── History panel ─────────────────────────────────
  async function openHistory() {
    const savedToken = localStorage.getItem("sb_token");
    const savedUser  = localStorage.getItem("sb_user");
    if (savedToken && savedUser) {
      try {
        currentToken = savedToken;
        currentUser  = JSON.parse(savedUser);
      } catch(e) {}
    }

    document.getElementById("history-panel").classList.add("open");
    const list = document.getElementById("history-list");
    list.innerHTML = '<div class="history-empty">Loading your looks...</div>';

    if (!currentToken || !currentUser) {
      list.innerHTML = '<div class="history-empty">Please login to see your history</div>';
      return;
    }

    try {
      const configRes  = await fetch("/api/config");
      const configData = await configRes.json();

      const res = await fetch(`${SUPABASE_URL}/rest/v1/chat_history?user_id=eq.${currentUser.id}&order=created_at.desc&limit=20`, {
        headers: {
          "apikey": configData.anonKey,
          "Authorization": "Bearer " + currentToken
        }
      });
      const data = await res.json();

      if (!Array.isArray(data) || !data.length) {
        list.innerHTML = '<div class="history-empty">No looks saved yet. Start chatting! ✨</div>';
        return;
      }

      list.innerHTML = "";
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <div class="history-item-q">💬 ${(item.user_message || "").substring(0, 60)}...</div>
          <div class="history-item-a">${(item.bot_reply || "").substring(0, 120)}...</div>
          <div class="history-item-date">${new Date(item.created_at).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })}</div>
        `;
        list.appendChild(div);
      });

    } catch (err) {
      list.innerHTML = '<div class="history-empty">Could not load history. Try again.</div>';
    }
  }

  function closeHistory() {
    document.getElementById("history-panel").classList.remove("open");
  }

  // ── Gender, occasions, budget ─────────────────────
  function setGender(gender, btn) {
    currentGender = gender;
    document.querySelectorAll(".gender-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderOccasions();
  }

  function renderOccasions() {
    const bar = document.getElementById("occasion-bar");
    bar.innerHTML = "";
    occasions[currentGender].forEach(occ => {
      const btn = document.createElement("button");
      btn.className = "occ-btn";
      btn.textContent = occ.label;
      btn.onclick = () => fillOccasion(occ.text);
      bar.appendChild(btn);
    });
  }

  function updateBudget(value) {
    currentBudget = parseInt(value);
    document.getElementById("budget-input").value = currentBudget;
    syncBudgetToDescribe();
  }

  function updateBudgetFromInput(value) {
    const v = parseInt(value);
    if (v >= 500 && v <= 10000) {
      currentBudget = v;
      document.getElementById("budget-slider").value = currentBudget;
      syncBudgetToDescribe();
    }
  }

  function syncBudgetToDescribe() {
    const input = document.getElementById("user-input");
    if (input.value.includes("budget ₹")) {
      input.value = input.value.replace(
        /budget ₹[\d,]+/,
        "budget ₹" + currentBudget.toLocaleString("en-IN")
      );
    }
  }

  function rebuildDescribe() {
    const input = document.getElementById("user-input");
    if (!input.value) return;
    const city     = document.getElementById("city-input").value.trim();
    const skinTone = document.getElementById("skin-tone-select").value;
    const body     = document.getElementById("body-select").value;
    let base = input.value.replace(/, budget ₹[\d,]+.*$/, "").trim();
    base += ", budget ₹" + currentBudget.toLocaleString("en-IN");
    if (city)     base += ", in " + city;
    if (skinTone) base += ", skin tone: " + skinTone;
    if (body)     base += ", body type: " + body;
    input.value = base;
  }

  function fillOccasion(text) {
    const input    = document.getElementById("user-input");
    const city     = document.getElementById("city-input").value.trim();
    const skinTone = document.getElementById("skin-tone-select").value;
    const body     = document.getElementById("body-select").value;
    let details = text + ", budget ₹" + currentBudget.toLocaleString("en-IN");
    if (city)     details += ", in " + city;
    if (skinTone) details += ", skin tone: " + skinTone;
    if (body)     details += ", body type: " + body;
    input.value = details;
    input.focus();
  }

  function getSkinTypePrompt() {
    const skinType = document.getElementById("skin-type-select").value;
    if (!skinType) return "";
    const tips = {
      oily:        "suggest matte finish, oil-free, non-comedogenic makeup products",
      dry:         "suggest hydrating, moisturizing, dewy finish makeup products",
      combination: "suggest oil-control on T-zone, hydration on dry areas",
      sensitive:   "suggest fragrance-free, hypoallergenic, gentle makeup products only",
      normal:      "suggest balanced, gentle products suitable for normal skin"
    };
    return `\n\nUser's skin type is ${skinType}. For makeup: ${tips[skinType]}.`;
  }

  // ── Messages ─────────────────────────────────────
  function addMessage(role, text) {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const avatar = document.createElement("div");
    avatar.className = `avatar ${role === "user" ? "user-avatar" : "bot-avatar"}`;
    avatar.textContent = role === "user" ? "👤" : "✨";
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role === "user" ? "user-bubble" : "bot-bubble"}`;
    bubble.textContent = text;

    if (role === "bot" && text.length > 100) {
      const shareBtn = document.createElement("button");
      shareBtn.className = "share-btn";
      shareBtn.textContent = "📤 Share this look";
      shareBtn.onclick = async () => {
        const msg = "✨ StyleBot gave me this look!\n\n" + text + "\n\nTry it: https://stylebot-three.vercel.app";
        if (navigator.share) {
          try { await navigator.share({ title: "My StyleBot Look ✨", text: msg }); } catch(e) {}
        } else {
          navigator.clipboard.writeText(msg);
          shareBtn.textContent = "✅ Copied!";
          setTimeout(() => shareBtn.textContent = "📤 Share this look", 2000);
        }
      };
      bubble.appendChild(shareBtn);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addTyping() {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing-indicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar bot-avatar";
    avatar.textContent = "✨";
    const bubble = document.createElement("div");
    bubble.className = "bubble bot-bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // ── Send message ─────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn   = document.getElementById("send-btn");
    const text  = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    input.value = "";
    btn.disabled = true;
    addTyping();

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages,
          systemPrompt: systemPrompts[currentGender] + getSkinTypePrompt(),
          userId: getUserId(),
          gender: currentGender,
          userMessage: text
        })
      });

      const data = await response.json();
      if (!data.choices) {
        addMessage("bot", "API Error: " + JSON.stringify(data));
        btn.disabled = false;
        return;
      }
      const reply = data.choices[0].message.content;
      messages.push({ role: "assistant", content: reply });
      removeTyping();
      addMessage("bot", reply);

    } catch (err) {
      removeTyping();
      addMessage("bot", "Sorry, something went wrong. Please try again!");
    }

    btn.disabled = false;
    input.focus();
  }

  // ── Event listeners ───────────────────────────────
  document.getElementById("user-input").addEventListener("input", function() {
    const match = this.value.match(/₹\s?([\d,]+)/);
    if (match) {
      const amount = parseInt(match[1].replace(/,/g, ""));
      if (amount >= 500 && amount <= 10000) {
        currentBudget = amount;
        document.getElementById("budget-slider").value = amount;
        document.getElementById("budget-input").value = amount;
      }
    }
  });

  document.getElementById("city-input").addEventListener("input", rebuildDescribe);
  document.getElementById("skin-tone-select").addEventListener("change", rebuildDescribe);
  document.getElementById("body-select").addEventListener("change", rebuildDescribe);

  // ── Update header buttons based on session ────────
  if (currentUser) {
    showLoggedIn(currentUser.email);
  }

  // ── Init ──────────────────────────────────────────
  renderOccasions();
  addMessage("bot", "Namaste! 👋 I'm StyleBot, your personal AI fashion stylist.\n\nI style everyone — Women, Men and Kids! 👩👨👦\n\nLogin to save your looks and see your style history! Or just start chatting — I'll give you a complete personalized look from head to toe! ✨");
</script>

</body>
</html>
