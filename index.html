<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StyleBot — Your AI Fashion Stylist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f5f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      width: 100%;
      background: #1a1a2e;
      color: white;
      padding: 18px 24px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 600; }
    header p  { font-size: 13px; opacity: 0.7; margin-top: 4px; }
    #chat-container {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 16px;
    }
    .message { display: flex; gap: 10px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bot-avatar  { background: #1a1a2e; color: white; }
    .user-avatar { background: #e8d5c4; color: #1a1a2e; }
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .bot-bubble {
      background: white; color: #1a1a2e;
      border-bottom-left-radius: 4px;
      border: 1px solid #e8e0d8;
    }
    .user-bubble {
      background: #1a1a2e; color: white;
      border-bottom-right-radius: 4px;
    }
    #input-area {
      width: 100%; max-width: 720px;
      display: flex; gap: 10px;
      padding: 16px;
      background: white;
      border-top: 1px solid #e8e0d8;
      position: sticky; bottom: 0;
    }
    #user-input {
      flex: 1; padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px; outline: none;
      font-family: inherit;
    }
    #user-input:focus { border-color: #1a1a2e; }
    #send-btn {
      background: #1a1a2e; color: white;
      border: none; border-radius: 24px;
      padding: 12px 20px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    #send-btn:hover    { background: #2d2d4e; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { display: flex; gap: 4px; padding: 14px 16px; align-items: center; }
    .typing span {
      width: 7px; height: 7px;
      background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<header>
  <h1>✨ StyleBot</h1>
  <p>Your AI fashion stylist — describe your occasion and get a complete look</p>
</header>

<div id="chat-container"></div>

<div id="input-area">
  <input
    type="text"
    id="user-input"
    placeholder="E.g. I have a wedding in Hyderabad next week, budget ₹3000..."
    onkeydown="if(event.key==='Enter') sendMessage()"
  />
  <button id="send-btn" onclick="sendMessage()">Send ✈</button>
</div>

<script>
  const systemPrompt = `You are StyleBot, an expert Indian fashion stylist AI.

When a user describes their occasion, location, weather, or budget, you give them a complete head-to-toe look recommendation including:

1. 👗 OUTFIT — specific clothing with color and fabric
2. 👠 FOOTWEAR — specific type and color
3. 💍 JEWELLERY — earrings, necklace, bangles etc
4. 👜 BAG/CLUTCH — type and color
5. 💄 MAKEUP — foundation, lip color, eye look
6. 💇 HAIRSTYLE — specific style suggestion

Always consider the occasion, location, weather, budget, and Indian fashion context.
Be warm, specific, and enthusiastic. Format clearly with each category on a new line.`;

  const messages = [];

  function addMessage(role, text) {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const avatar = document.createElement("div");
    avatar.className = `avatar ${role === "user" ? "user-avatar" : "bot-avatar"}`;
    avatar.textContent = role === "user" ? "👤" : "✨";
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role === "user" ? "user-bubble" : "bot-bubble"}`;
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addTyping() {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing-indicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar bot-avatar";
    avatar.textContent = "✨";
    const bubble = document.createElement("div");
    bubble.className = "bubble bot-bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn   = document.getElementById("send-btn");
    const text  = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    input.value = "";
    btn.disabled = true;
    addTyping();

    try {
      const response = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, systemPrompt })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;
      messages.push({ role: "assistant", content: reply });
      removeTyping();
      addMessage("bot", reply);

    } catch (err) {
      removeTyping();
      addMessage("bot", "Sorry, something went wrong. Please try again!");
    }

    btn.disabled = false;
    input.focus();
  }

  addMessage("bot", "Namaste! 👋 I'm StyleBot, your personal AI fashion stylist.\n\nTell me about your occasion — where are you going, what's the event, your budget, and I'll give you a complete look from head to toe! 💃");
</script>

</body>
</html>
